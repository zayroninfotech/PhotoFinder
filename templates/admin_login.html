<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Zayron Infotech</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #07091a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* Animated background blobs matching logo colors */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.12;
      animation: float 9s ease-in-out infinite;
      pointer-events: none;
    }
    body::before {
      width: 650px; height: 650px;
      background: #1e3a8a;
      top: -220px; left: -220px;
    }
    body::after {
      width: 500px; height: 500px;
      background: #d97706;
      bottom: -160px; right: -160px;
      animation-delay: -4.5s;
    }
    @keyframes float {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(28px, 18px) scale(1.06); }
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(15, 22, 50, 0.88);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(245,158,11,0.12);
      border-radius: 24px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* Company branding */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 14px;
      filter: drop-shadow(0 4px 20px rgba(217,119,6,0.35));
    }
    .brand-name {
      color: #f1f5f9;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .brand-name span {
      display: block;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-sub {
      color: #64748b;
      font-size: .78rem;
      margin-top: 6px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .divider-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,158,11,0.2), transparent);
      margin: 0 0 24px;
    }

    label {
      display: block;
      color: #94a3b8;
      font-size: .77rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(7, 9, 26, 0.7);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      color: #f1f5f9;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 18px;
    }
    input:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245,158,11,0.12);
    }
    input::placeholder { color: #334155; }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #b45309, #f59e0b, #fbbf24);
      border: none;
      border-radius: 10px;
      color: #0a0e1f;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 4px;
      letter-spacing: .02em;
    }
    .btn:hover  { opacity: .88; }
    .btn:active { transform: scale(.98); }

    .error-box {
      background: rgba(239, 68, 68, .1);
      border: 1px solid rgba(239, 68, 68, .25);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .84rem;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-hint {
      text-align: center;
      color: #334155;
      font-size: .74rem;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .footer-hint strong { color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/static/logo.png" alt="Zayron Infotech" class="brand-logo">
      <div class="brand-name">
        Zayron Infotech<span>Pvt. Ltd.</span>
      </div>
      <p class="brand-sub">PhotoFinder — Admin Portal</p>
    </div>

    <div class="divider-line"></div>

    {% if error %}
    <div class="error-box">
      <span>⚠</span> {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username"
             value="{{ request.form.get('username','') }}" autocomplete="username">

      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password"
             autocomplete="current-password">

      <button class="btn" type="submit">Sign In →</button>
    </form>

    <p class="footer-hint">
      Authorized personnel only &bull; <strong>Zayron Infotech Pvt. Ltd.</strong>
    </p>
  </div>
</body>
</html>
