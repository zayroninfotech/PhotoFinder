<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Found – PhotoFinder</title>
  <style>
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0f172a; color: #f1f5f9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      text-align: center; padding: 20px;
    }
    .icon { font-size: 72px; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p  { color: #64748b; margin-top: 8px; }
    a  { display: inline-block; margin-top: 24px; padding: 10px 24px;
         background: #3b82f6; color: #fff; border-radius: 10px;
         text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

<!-- ─── Page Loader ─────────────────────────────── -->
<div id="pgLoader"><div class="pg-spin"></div></div>
<style>
  #pgLoader{position:fixed;inset:0;z-index:99999;background:#000010;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .45s ease,visibility .45s ease;}
  #pgLoader.done{opacity:0;visibility:hidden;pointer-events:none;}
  .pg-spin{width:56px;height:56px;border-radius:50%;border:4px solid rgba(255,255,255,0.07);border-top:4px solid #3b82f6;border-right:4px solid #f59e0b;animation:pgSpin .75s linear infinite;}
  @keyframes pgSpin{to{transform:rotate(360deg);}}
</style>
<script>(function(){var L=document.getElementById('pgLoader');function h(){L.classList.add('done');}window.addEventListener('load',h);window.addEventListener('pageshow',function(e){if(e.persisted)h();});setTimeout(h,6000);})();</script>

  <div>
    <div class="icon">🔍</div>
    <h1>Event Not Found</h1>
    <p>This QR code may be expired or invalid. Please ask the organizer for a new QR.</p>
    <a href="/admin/login">Admin Login</a>
  </div>
</body>
</html>
